name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

  smoke:
    name: kind smoke (${{ matrix.variant }})
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        variant: [flannel-go, flannel-rs]
    steps:
      - uses: actions/checkout@v5

      - name: Install kind and kubectl
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          curl -fsSLo kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
          kind version && kubectl version --client

      # Same-node pod -> Service -> pod traffic is bridged and only traverses
      # iptables (kube-proxy DNAT/masq) when br_netfilter is loaded. GH runners
      # don't load it by default; without this, in-cluster DNS flakes whenever
      # CoreDNS and the client land on the same node.
      - name: Enable bridge netfilter
        run: |
          sudo modprobe br_netfilter
          sudo sysctl -w net.bridge.bridge-nf-call-iptables=1

      - name: Build flannel-rs image
        if: matrix.variant == 'flannel-rs'
        run: docker build -t flannel-rs:dev .

      - name: Run smoke (${{ matrix.variant }})
        run: bash tests/smoke/run.sh ${{ matrix.variant }}

  conformance:
    name: sig-network conformance (flannel-rs)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install kind and kubectl
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          curl -fsSLo kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Install hydrophone
        env:
          HYDROPHONE_VERSION: "0.7.0"
          HYDROPHONE_SHA256: "15a6c09962f9bd4a1587af068b5edef1072327a77012d8fbb84992c7c87c0475"
        run: |
          tgz="hydrophone_Linux_x86_64.tar.gz"
          curl -fsSLo "$tgz" \
            "https://github.com/kubernetes-sigs/hydrophone/releases/download/v${HYDROPHONE_VERSION}/${tgz}"
          echo "${HYDROPHONE_SHA256}  ${tgz}" | sha256sum -c -
          tar -xzf "$tgz" hydrophone
          chmod +x hydrophone && sudo mv hydrophone /usr/local/bin/hydrophone

      - name: Enable bridge netfilter
        run: |
          sudo modprobe br_netfilter
          sudo sysctl -w net.bridge.bridge-nf-call-iptables=1

      - name: Build flannel-rs image
        run: docker build -t flannel-rs:dev .

      - name: Run sig-network conformance (flannel-rs)
        run: bash tests/conformance/run.sh flannel-rs
